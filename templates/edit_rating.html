<!-- Declare standard HTML5 document format type -->
<!DOCTYPE html>
<!-- Declare page markup language layout accessibility rules -->
<html lang="en">
  <!-- Head section loading metadata details, titles, styling assets, and typography definitions -->
  <head>
    <!-- Set default page character encoding configurations -->
    <meta charset="UTF-8" />
    <!-- Configure responsive window scaling to dynamically size elements on smaller screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title displayed on browser tab title bar -->
    <title>Edit Rating - My Bookshelf</title>
    <!-- Connect Google fonts web library API to import the premium Inter font styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Import custom styling definitions dynamically using Flask's static assets builder route -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <!-- Body defines the actual visual framework structure displayed in the viewport -->
  <body>
    <!-- Center panel styled with modern frosted-glass visual wrappers -->
    <div class="container" id="edit-form-container">
      <!-- Layout header displaying gradient titles -->
      <header id="form-header">
        <h1 id="form-title">Edit Rating</h1>
      </header>

      <!-- Main container displaying content and database records -->
      <main id="form-content">
        <!-- Render contextual status alerts using Jinja2 flash engine blocks -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          <!-- Check if messages list contains active warnings logged by context -->
          {% if messages %}
            <!-- Outer grid container wrapping alerts -->
            <div class="alert-container" id="alert-messages-block">
              <!-- Loop over flashed messages, unpacking category type and context details -->
              {% for category, message in messages %}
                <!-- Render active alerts styled by alert status class variables -->
                <div class="alert alert-{{ category }}" role="alert">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <!-- Form context pointing to edit endpoint handler via HTTP POST verb -->
        <form action="{{ url_for('edit') }}" method="POST" id="edit-rating-form">
          <!-- Information card block showing current properties of selected book -->
          <div class="book-card" id="selected-book-details" style="margin-bottom: 1.5rem; pointer-events: none;">
            <div class="book-info">
              <!-- Interpolate title value of book selected by SQLAlchemy -->
              <span class="book-title">{{ book.title }}</span>
              <!-- Interpolate author value of book selected by SQLAlchemy -->
              <span class="book-author">by {{ book.author }}</span>
              <!-- Metabar showing current rating rating value of selected book -->
              <div class="book-meta">
                <span class="rating-badge">Current: {{ book.rating }} / 10</span>
              </div>
            </div>
          </div>

          <!-- Hidden input storing target book ID to tell SQLAlchemy controller which record to edit -->
          <input type="hidden" name="id" value="{{ book.id }}" />

          <!-- Input group capture control for ratings modification -->
          <div class="form-group">
            <label for="book-rating-input">New Rating (0 - 10)</label>
            <!-- Number input type forcing valid floats, constraining value bounds -->
            <input 
              name="rating" 
              type="number" 
              id="book-rating-input" 
              min="0" 
              max="10" 
              step="0.1" 
              value="{{ book.rating }}" 
              placeholder="e.g., 9.2" 
              required 
              autofocus 
            />
          </div>

          <!-- Horizontal container alignment for cancel navigation and submission triggers -->
          <div class="form-actions">
            <!-- Secondary action back link, enabling seamless cancel exits -->
            <a href="{{ url_for('home') }}" class="btn btn-secondary" id="cancel-btn">Cancel</a>
            <!-- Main CTA submitting modified form inputs to application backend controllers -->
            <button type="submit" class="btn btn-primary" id="submit-btn">Change Rating</button>
          </div>
        </form>
      </main>
    </div>
  </body>
</html>
